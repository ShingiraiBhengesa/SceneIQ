services:
  - type: web
    name: sceneiq-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://sceneiq-frontend.onrender.com

  - type: web
    name: sceneiq-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    envVars:
      - key: REACT_APP_API_URL
        value: https://sceneiq-backend.onrender.com